name: Build Claude Island

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Build
        run: |
          xcodebuild -project ClaudeIsland.xcodeproj \
            -scheme "ClaudeIsland" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SWIFT_VERSION=5.0 \
            build

      - name: Package app
        run: |
          APP_PATH=$(find build -name "Claude Island.app" -type d | head -1)
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/ClaudeIsland.zip" "Claude Island.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeIsland
          path: ClaudeIsland.zip
